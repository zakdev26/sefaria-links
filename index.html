<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sefaria Links → Word</title>
<style>
  :root {
    --bg: #f4f1ea;
    --card: #fffdf8;
    --ink: #2b2620;
    --muted: #6f675a;
    --line: #ddd5c7;
    --accent: #8a6d3b;
    --accent-dark: #6b5329;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: Georgia, 'Times New Roman', serif;
    line-height: 1.5;
    -webkit-text-size-adjust: 100%;
  }
  .wrap { max-width: 640px; margin: 0 auto; padding: 24px 18px 64px; }
  h1 { font-size: 22px; margin: 8px 0 4px; }
  .sub { color: var(--muted); font-size: 14px; margin: 0 0 20px; }
  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 16px;
  }
  label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
  .refwrap { position: relative; }
  input[type=text] {
    width: 100%; padding: 12px; font-size: 16px; font-family: inherit;
    border: 1px solid var(--line); border-radius: 8px; background: #fff; color: var(--ink);
  }
  .ac {
    position: absolute; left: 0; right: 0; top: calc(100% + 4px); z-index: 20;
    background: #fff; border: 1px solid var(--line); border-radius: 8px;
    box-shadow: 0 6px 18px rgba(0,0,0,.08); overflow: hidden; display: none;
  }
  .ac .item { padding: 10px 12px; font-size: 15px; cursor: pointer; border-bottom: 1px solid var(--line); }
  .ac .item:last-child { border-bottom: none; }
  .ac .item:hover, .ac .item.active { background: #f2ecdd; }
  button {
    font-family: inherit; font-size: 16px; cursor: pointer;
    border: none; border-radius: 8px; padding: 12px 16px;
    background: var(--accent); color: #fff; width: 100%; margin-top: 12px;
  }
  button:hover { background: var(--accent-dark); }
  button:disabled { opacity: .5; cursor: default; }
  .status { font-size: 14px; color: var(--muted); min-height: 20px; margin-top: 10px; }
  .status.err { color: #a23b2c; }
  .toggles { display: flex; gap: 18px; margin: 4px 0 0; }
  .toggles label { display: flex; align-items: center; gap: 6px; font-size: 15px; color: var(--ink); margin: 0; }
  .tree { display: none; }
  .cat { border: 1px solid var(--line); border-radius: 8px; margin-bottom: 10px; overflow: hidden; }
  .cat-head {
    display: flex; align-items: center; gap: 8px; padding: 10px 12px;
    background: #f2ecdd; cursor: pointer; font-size: 15px;
  }
  .cat-head .caret { transition: transform .15s; font-size: 12px; color: var(--muted); }
  .cat.collapsed .caret { transform: rotate(-90deg); }
  .cat-head .count { color: var(--muted); font-size: 13px; }
  .cat-head .cat-toggle { margin-left: auto; font-size: 12px; color: var(--accent); text-decoration: underline; }
  .comm-list { padding: 4px 12px 8px; }
  .cat.collapsed .comm-list { display: none; }
  .comm {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 0; border-bottom: 1px solid var(--line); font-size: 15px; margin: 0;
  }
  .comm:last-child { border-bottom: none; }
  .comm .count { margin-left: auto; color: var(--muted); font-size: 13px; }
  .globaltoggle { font-size: 13px; color: var(--accent); cursor: pointer; text-decoration: underline; }
  .treehead { display: flex; align-items: center; margin-bottom: 10px; }
  .treehead strong { font-size: 15px; }
  .treehead .globaltoggle { margin-left: auto; }
  .hint { font-size: 12px; color: var(--muted); margin-top: 14px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Sefaria Links → Word</h1>
  <p class="sub">Enter a reference, choose which commentaries you want, get a Word document.</p>

  <div class="card">
    <label for="ref">Reference</label>
    <div class="refwrap">
      <input type="text" id="ref" placeholder="Start typing… e.g. Shabbat 100a" autocomplete="off" autocapitalize="off" spellcheck="false">
      <div class="ac" id="ac"></div>
    </div>
    <div class="toggles">
      <label><input type="checkbox" id="incHe" checked> Hebrew</label>
      <label><input type="checkbox" id="incEn" checked> English</label>
    </div>
    <button id="fetchBtn">Fetch links</button>
    <div class="status" id="status"></div>
  </div>

  <div class="card tree" id="treeCard">
    <div class="treehead">
      <strong>Choose sources</strong>
      <span class="globaltoggle" id="toggleAll">select all / none</span>
    </div>
    <div id="tree"></div>
    <button id="genBtn">Build Word document</button>
  </div>

  <p class="hint">Runs entirely in your browser — nothing is sent anywhere except Sefaria. On mobile: build the doc, then use the share sheet → <em>Send to Kindle</em>.</p>
</div>

<script>
const $ = id => document.getElementById(id);
const NAME_API = "https://www.sefaria.org/api/name/";
const LINKS_API = "https://www.sefaria.org/api/links/";
let LINKS = [];      // link objects with text
let TREE = {};       // category -> { commentator -> [links] }
let CAT_ORDER = [];  // categories, most links first

// --- load the Word-doc library (with CDN fallback) -------------------------
function loadScript(src) {
  return new Promise((resolve, reject) => {
    const s = document.createElement("script");
    s.src = src;
    s.onload = () => resolve();
    s.onerror = () => reject(new Error("load failed: " + src));
    document.head.appendChild(s);
  });
}
async function ensureDocx() {
  if (window.docx) return window.docx;
  const cdns = [
    "https://cdn.jsdelivr.net/npm/docx@9.7.1/dist/index.umd.cjs",
    "https://unpkg.com/docx@9.7.1/dist/index.umd.cjs"
  ];
  for (const url of cdns) {
    try { await loadScript(url); if (window.docx) return window.docx; } catch (e) {}
  }
  return null;
}

const statusEl = $("status");
function setStatus(msg, isErr) {
  statusEl.textContent = msg;
  statusEl.className = "status" + (isErr ? " err" : "");
}

// --- helpers ---------------------------------------------------------------
function asText(field) {
  if (!field) return "";
  if (Array.isArray(field)) return field.map(asText).join(" ");
  return String(field);
}
function stripHtml(html) {
  if (!html) return "";
  const div = document.createElement("div");
  div.innerHTML = html;
  div.querySelectorAll("sup, .footnote, i.footnote, .mam-spi-pe").forEach(n => n.remove());
  return (div.textContent || "").replace(/\s+/g, " ").trim();
}
function commName(l) {
  return (l.collectiveTitle && l.collectiveTitle.en) || l.index_title || l.category || "Other";
}
function catName(l) { return l.category || "Other"; }
function keyFor(cat, comm) { return cat + "||" + comm; }

// ===========================================================================
// Reference autocomplete (Sefaria's own name API)
// ===========================================================================
const acBox = $("ac");
let acItems = [], acActive = -1, acTimer = null;

function hideAC() { acBox.style.display = "none"; acItems = []; acActive = -1; }

function renderAC(list) {
  if (!list.length) { hideAC(); return; }
  acItems = list;
  acActive = -1;
  acBox.innerHTML = list.map((s, i) =>
    `<div class="item" data-i="${i}">${s}</div>`
  ).join("");
  acBox.style.display = "block";
  [...acBox.querySelectorAll(".item")].forEach(el => {
    el.addEventListener("mousedown", e => {   // mousedown fires before blur
      e.preventDefault();
      pickAC(parseInt(el.dataset.i, 10));
    });
  });
}
function pickAC(i) {
  if (i < 0 || i >= acItems.length) return;
  $("ref").value = acItems[i];
  hideAC();
  $("ref").focus();
}
async function queryNames(q) {
  try {
    const res = await fetch(NAME_API + encodeURIComponent(q) + "?limit=8");
    if (!res.ok) return;
    const data = await res.json();
    const list = Array.isArray(data.completions) ? data.completions.slice(0, 8) : [];
    renderAC(list);
  } catch (e) { /* silent: typing still works */ }
}
$("ref").addEventListener("input", () => {
  const q = $("ref").value.trim();
  clearTimeout(acTimer);
  if (q.length < 2) { hideAC(); return; }
  acTimer = setTimeout(() => queryNames(q), 220);
});
$("ref").addEventListener("keydown", e => {
  if (acBox.style.display === "block" && acItems.length) {
    if (e.key === "ArrowDown") { e.preventDefault(); acActive = (acActive + 1) % acItems.length; }
    else if (e.key === "ArrowUp") { e.preventDefault(); acActive = (acActive - 1 + acItems.length) % acItems.length; }
    else if (e.key === "Enter") {
      if (acActive >= 0) { e.preventDefault(); pickAC(acActive); return; }
      hideAC(); fetchLinks(); return;
    }
    else if (e.key === "Escape") { hideAC(); return; }
    else return;
    [...acBox.querySelectorAll(".item")].forEach((el, i) =>
      el.classList.toggle("active", i === acActive));
    return;
  }
  if (e.key === "Enter") fetchLinks();
});
$("ref").addEventListener("blur", () => setTimeout(hideAC, 150));

// ===========================================================================
// Fetch links + build the source tree
// ===========================================================================
async function fetchLinks() {
  const ref = $("ref").value.trim();
  if (!ref) { setStatus("Enter a reference first.", true); return; }

  $("fetchBtn").disabled = true;
  $("treeCard").style.display = "none";
  setStatus("Fetching…");

  try {
    const res = await fetch(LINKS_API + encodeURIComponent(ref) + "?with_text=1");
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    if (!Array.isArray(data) || data.length === 0) {
      setStatus("No links found for that reference.", true);
      return;
    }

    LINKS = data.filter(l => asText(l.he) || asText(l.text));

    // group: category -> commentator -> links
    TREE = {};
    for (const l of LINKS) {
      const c = catName(l), n = commName(l);
      (TREE[c] = TREE[c] || {});
      (TREE[c][n] = TREE[c][n] || []).push(l);
    }
    const catCount = c => Object.values(TREE[c]).reduce((s, arr) => s + arr.length, 0);
    CAT_ORDER = Object.keys(TREE).sort((a, b) => catCount(b) - catCount(a));

    renderTree(catCount);
    setStatus(`Found ${LINKS.length} texts. Choose which to include below.`);
  } catch (e) {
    setStatus("Could not fetch: " + e.message + ". Check the reference.", true);
  } finally {
    $("fetchBtn").disabled = false;
  }
}

function renderTree(catCount) {
  const html = CAT_ORDER.map(cat => {
    const comms = Object.keys(TREE[cat]).sort((a, b) => TREE[cat][b].length - TREE[cat][a].length);
    const rows = comms.map(comm => {
      const n = TREE[cat][comm].length;
      const k = keyFor(cat, comm);
      return `<label class="comm">
        <input type="checkbox" class="commbox" data-cat="${encodeURIComponent(cat)}" value="${encodeURIComponent(k)}" checked>
        <span>${comm}</span><span class="count">${n}</span>
      </label>`;
    }).join("");
    return `<div class="cat" data-cat="${encodeURIComponent(cat)}">
      <div class="cat-head">
        <span class="caret">▾</span>
        <strong>${cat}</strong><span class="count">${catCount(cat)}</span>
        <span class="cat-toggle">all / none</span>
      </div>
      <div class="comm-list">${rows}</div>
    </div>`;
  }).join("");
  $("tree").innerHTML = html;

  // collapse/expand on header click (but not when hitting the all/none link)
  [...$("tree").querySelectorAll(".cat-head")].forEach(head => {
    head.addEventListener("click", e => {
      if (e.target.classList.contains("cat-toggle")) return;
      head.parentElement.classList.toggle("collapsed");
    });
  });
  // per-category all/none
  [...$("tree").querySelectorAll(".cat-toggle")].forEach(link => {
    link.addEventListener("click", e => {
      e.stopPropagation();
      const cat = link.closest(".cat");
      const boxes = [...cat.querySelectorAll(".commbox")];
      const anyOff = boxes.some(b => !b.checked);
      boxes.forEach(b => b.checked = anyOff);
    });
  });
  $("treeCard").style.display = "block";
}

$("toggleAll").onclick = () => {
  const boxes = [...document.querySelectorAll(".commbox")];
  const anyOff = boxes.some(b => !b.checked);
  boxes.forEach(b => b.checked = anyOff);
};

// ===========================================================================
// Build the Word document
// ===========================================================================
async function buildDoc() {
  setStatus("Loading document library…");
  const d = await ensureDocx();
  if (!d) { setStatus("Document library failed to load — check your connection and try again.", true); return; }

  const chosen = new Set([...document.querySelectorAll(".commbox:checked")]
    .map(b => decodeURIComponent(b.value)));
  const incHe = $("incHe").checked;
  const incEn = $("incEn").checked;
  if (!incHe && !incEn) { setStatus("Pick Hebrew, English, or both.", true); return; }
  if (chosen.size === 0) { setStatus("Select at least one source.", true); return; }

  $("genBtn").disabled = true;
  setStatus("Building document…");

  const { Document, Packer, Paragraph, TextRun, HeadingLevel, AlignmentType } = d;
  const ref = $("ref").value.trim();
  const children = [];
  let written = 0;

  children.push(new Paragraph({
    heading: HeadingLevel.TITLE,
    children: [new TextRun({ text: "Linked texts: " + ref })]
  }));

  for (const cat of CAT_ORDER) {
    const comms = Object.keys(TREE[cat]).sort((a, b) => TREE[cat][b].length - TREE[cat][a].length);
    const active = comms.filter(comm => chosen.has(keyFor(cat, comm)));
    if (!active.length) continue;

    children.push(new Paragraph({
      heading: HeadingLevel.HEADING_1,
      spacing: { before: 320, after: 120 },
      children: [new TextRun({ text: cat })]
    }));

    for (const comm of active) {
      children.push(new Paragraph({
        heading: HeadingLevel.HEADING_2,
        spacing: { before: 220, after: 60 },
        children: [new TextRun({ text: comm })]
      }));

      for (const l of TREE[cat][comm]) {
        const enRef = l.sourceRef || l.ref || "";
        const heRef = l.sourceHeRef || "";
        children.push(new Paragraph({
          heading: HeadingLevel.HEADING_4,
          spacing: { before: 120, after: 30 },
          children: [new TextRun({ text: enRef + (heRef ? "  —  " + heRef : "") })]
        }));
        if (incHe) {
          const he = stripHtml(asText(l.he));
          if (he) children.push(new Paragraph({
            bidirectional: true,
            alignment: AlignmentType.RIGHT,
            spacing: { after: 80 },
            children: [new TextRun({ text: he, rightToLeft: true, font: "David", size: 26 })]
          }));
        }
        if (incEn) {
          const en = stripHtml(asText(l.text));
          if (en) children.push(new Paragraph({
            spacing: { after: 120 },
            children: [new TextRun({ text: en, size: 22 })]
          }));
        }
        written++;
      }
    }
  }

  try {
    const doc = new Document({ sections: [{ properties: {}, children }] });
    const blob = await Packer.toBlob(doc);
    const fname = ref.replace(/[^\w\u0590-\u05FF]+/g, "_").replace(/^_|_$/g, "") || "sefaria_links";
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = fname + ".docx";
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
    setStatus(`Done — ${written} texts written to ${fname}.docx`);
  } catch (e) {
    setStatus("Failed to build document: " + e.message, true);
  } finally {
    $("genBtn").disabled = false;
  }
}

$("fetchBtn").onclick = fetchLinks;
$("genBtn").onclick = buildDoc;
</script>
</body>
</html>
